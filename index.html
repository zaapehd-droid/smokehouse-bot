<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SmokeHouse – Boutique</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #0e0e0e;
      --surface:  #181818;
      --card:     #1e1e1e;
      --border:   #2c2c2c;
      --gold:     #c9a84c;
      --gold-dim: #8a6e2f;
      --amber:    #e8892b;
      --text:     #f0ece4;
      --muted:    #6e6a65;
      --radius:   13px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(14,14,14,.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 13px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 1.2rem;
      letter-spacing: -0.03em; color: var(--gold);
    }
    .logo span { color: var(--text); }
    .cart-btn {
      display: flex; align-items: center; gap: 7px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 50px; padding: 8px 14px;
      cursor: pointer; font-size: 0.82rem; color: var(--text);
      transition: border-color .2s;
    }
    .cart-btn:active { border-color: var(--gold); }
    .cart-count {
      background: var(--gold); color: #000;
      border-radius: 50%; width: 18px; height: 18px;
      font-size: 0.62rem; font-weight: 700;
      display: none; align-items: center; justify-content: center;
    }
    .cart-count.on { display: flex; }

    /* ── HERO BANNER ── */
    .hero {
      margin: 12px 16px 0;
      background: linear-gradient(120deg, #1a1400 0%, #2a1e00 60%, #1c1407 100%);
      border: 1px solid var(--gold-dim);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex; align-items: center; gap: 14px;
    }
    .hero-icon { font-size: 2.4rem; flex-shrink: 0; }
    .hero-text {}
    .hero-title {
      font-family: 'Syne', sans-serif;
      font-size: 1rem; font-weight: 800;
      color: var(--gold); line-height: 1.2;
    }
    .hero-sub { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }

    /* ── TABS ── */
    .tabs {
      display: flex; gap: 7px;
      padding: 14px 16px 0;
      overflow-x: auto; scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0; padding: 7px 15px;
      border-radius: 50px; border: 1px solid var(--border);
      background: var(--surface); color: var(--muted);
      font-size: 0.78rem; cursor: pointer; transition: all .18s;
    }
    .tab.active {
      background: var(--gold); border-color: var(--gold);
      color: #000; font-weight: 700;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      padding: 16px 16px 6px;
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--muted);
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 0 16px 120px;
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex; flex-direction: column;
      position: relative;
      transition: border-color .18s, transform .1s;
    }
    .card:active { transform: scale(.98); }
    .card.featured { border-color: var(--gold-dim); }

    .badge {
      position: absolute; top: 8px; left: 8px;
      background: var(--amber); color: #000;
      font-size: 0.55rem; font-weight: 800;
      padding: 2px 6px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .badge.new-badge { background: #27ae60; color: #fff; }

    /* SVG product illustration area */
    .card-img {
      width: 100%; aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #191919 0%, #232323 100%);
      overflow: hidden; position: relative;
    }
    .card-img svg { width: 70%; height: 70%; }

    .card-body { padding: 10px; flex: 1; display: flex; flex-direction: column; gap: 3px; }
    .card-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 0.82rem; line-height: 1.25;
    }
    .card-desc { font-size: 0.68rem; color: var(--muted); line-height: 1.45; margin-top: 1px; }
    .card-mat {
      font-size: 0.63rem; color: var(--gold-dim);
      text-transform: uppercase; letter-spacing: 0.07em;
      margin-top: 2px;
    }
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 9px;
    }
    .card-price {
      color: var(--gold); font-weight: 700;
      font-size: 0.92rem; font-family: 'Syne', sans-serif;
    }
    .add-btn {
      background: var(--gold); color: #000; border: none;
      border-radius: 8px; width: 28px; height: 28px;
      font-size: 1.15rem; font-weight: 800;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .12s; flex-shrink: 0;
    }
    .add-btn:active { background: var(--amber); }

    /* ── QTY CTRL ── */
    .qty-ctrl { display: flex; align-items: center; gap: 5px; }
    .qty-btn {
      width: 26px; height: 26px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text);
      cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
    }
    .qty-btn:active { background: var(--gold-dim); border-color: var(--gold-dim); }
    .qty-num { font-size: 0.85rem; font-weight: 700; min-width: 16px; text-align: center; }

    /* ── OVERLAY ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.65);
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity .22s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    /* ── CART PANEL ── */
    .cart-panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 101;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-radius: 18px 18px 0 0;
      transform: translateY(100%);
      transition: transform .28s cubic-bezier(.4,0,.2,1);
      max-height: 88vh; display: flex; flex-direction: column;
    }
    .cart-panel.open { transform: translateY(0); }
    .drag-handle {
      width: 38px; height: 4px;
      background: var(--border); border-radius: 2px;
      margin: 11px auto 0; flex-shrink: 0;
    }
    .cp-header {
      padding: 13px 16px 11px;
      font-family: 'Syne', sans-serif;
      font-size: 1.05rem; font-weight: 800;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .close-x {
      background: none; border: none;
      color: var(--muted); font-size: 1.5rem;
      cursor: pointer; line-height: 1; padding: 0 4px;
    }
    .cp-items { overflow-y: auto; flex: 1; }
    .cp-empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 44px 16px;
      color: var(--muted); gap: 8px; font-size: 0.88rem;
    }
    .cp-empty-icon { font-size: 2.6rem; }
    .cp-item {
      display: flex; align-items: center; gap: 11px;
      padding: 11px 16px; border-bottom: 1px solid var(--border);
    }
    .cp-item-img {
      width: 46px; height: 46px; border-radius: 9px;
      background: var(--card); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden;
    }
    .cp-item-img svg { width: 65%; height: 65%; }
    .cp-info { flex: 1; }
    .cp-name { font-size: 0.82rem; font-weight: 600; }
    .cp-uprice { font-size: 0.7rem; color: var(--gold); margin-top: 2px; }
    .cp-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
    .cp-total { font-size: 0.85rem; font-weight: 700; font-family: 'Syne', sans-serif; }
    .cp-footer {
      padding: 14px 16px; border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .total-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 13px;
    }
    .total-label { color: var(--muted); font-size: 0.88rem; }
    .total-val {
      font-family: 'Syne', sans-serif;
      font-size: 1.15rem; font-weight: 800; color: var(--gold);
    }
    .order-btn {
      width: 100%; padding: 15px;
      background: linear-gradient(130deg, var(--gold) 0%, var(--amber) 100%);
      border: none; border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem; font-weight: 800;
      color: #000; cursor: pointer; letter-spacing: 0.01em;
      transition: opacity .14s;
    }
    .order-btn:active { opacity: .82; }
    .order-btn:disabled { opacity: .38; cursor: default; }

    /* ── SUCCESS ── */
    .success {
      position: fixed; inset: 0; z-index: 200;
      background: var(--bg);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; padding: 32px; text-align: center;
    }
    .success.show { display: flex; }
    .success-ring {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, #1a2e1a, #0e1f0e);
      border: 2px solid #27ae60;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem;
    }
    .success-title { font-family: 'Syne', sans-serif; font-size: 1.35rem; font-weight: 800; color: var(--gold); }
    .success-sub { color: var(--muted); font-size: 0.85rem; line-height: 1.55; max-width: 260px; }
    .success-back {
      margin-top: 6px; padding: 12px 30px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 50px; color: var(--text);
      cursor: pointer; font-size: 0.88rem;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Smoke<span>House</span></div>
  <button class="cart-btn" onclick="openCart()">
    <span>🛒</span> Panier
    <span class="cart-count" id="cartCount">0</span>
  </button>
</header>

<div class="hero">
  <div class="hero-icon">🌿</div>
  <div class="hero-text">
    <div class="hero-title">Accessoires fumeur premium</div>
    <div class="hero-sub">Plateaux · Bols · Grinders — livraison rapide</div>
  </div>
</div>

<div class="tabs" id="tabs"></div>
<div id="catalog"></div>

<div class="overlay" id="overlay" onclick="closeCart()"></div>

<div class="cart-panel" id="cartPanel">
  <div class="drag-handle"></div>
  <div class="cp-header">
    <span>Mon Panier</span>
    <button class="close-x" onclick="closeCart()">×</button>
  </div>
  <div class="cp-items" id="cpItems"></div>
  <div class="cp-footer">
    <div class="total-row">
      <span class="total-label">Total</span>
      <span class="total-val" id="totalVal">0,00 €</span>
    </div>
    <button class="order-btn" id="orderBtn" onclick="sendOrder()" disabled>
      ✉️ &nbsp;Commander maintenant
    </button>
  </div>
</div>

<div class="success" id="success">
  <div class="success-ring">✅</div>
  <div class="success-title">Commande envoyée !</div>
  <div class="success-sub">Votre commande a bien été transmise au vendeur. Il vous répondra très vite sur Telegram.</div>
  <button class="success-back" onclick="resetAll()">← Continuer les achats</button>
</div>

<script>
// ─── Telegram init ────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#0e0e0e'); tg.setBackgroundColor('#0e0e0e'); }

// ─── SVG illustrations ────────────────────────────
const SVG = {
  plateau: (color1='#8B6914', color2='#C9A84C') => `
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="10" y="35" width="80" height="30" rx="5" fill="${color1}" opacity=".9"/>
      <rect x="10" y="35" width="80" height="6" rx="3" fill="${color2}" opacity=".5"/>
      <rect x="14" y="41" width="72" height="20" rx="3" fill="${color1}" opacity=".6"/>
      <rect x="6" y="60" width="88" height="8" rx="4" fill="${color2}" opacity=".7"/>
      <rect x="6" y="32" width="88" height="8" rx="4" fill="${color2}" opacity=".7"/>
    </svg>`,
  plateauArdoise: () => `
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="8" y="30" width="84" height="40" rx="6" fill="#2a2a2a"/>
      <rect x="8" y="30" width="84" height="7" rx="4" fill="#444"/>
      <rect x="8" y="63" width="84" height="7" rx="4" fill="#444"/>
      <line x1="20" y1="45" x2="80" y2="45" stroke="#555" stroke-width="1.5" stroke-dasharray="4 3"/>
      <line x1="20" y1="52" x2="80" y2="52" stroke="#555" stroke-width="1.5" stroke-dasharray="4 3"/>
      <rect x="12" y="34" width="76" height="32" rx="3" fill="#232323" opacity=".5"/>
    </svg>`,
  plateauRolling: () => `
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="12" y="28" width="76" height="44" rx="7" fill="#3d2b1a"/>
      <rect x="16" y="32" width="68" height="36" rx="5" fill="#2a1e10"/>
      <rect x="16" y="32" width="68" height="36" rx="5" fill="#5B3A1E" opacity=".3"/>
      <rect x="12" y="28" width="76" height="6" rx="4" fill="#7a5230" opacity=".8"/>
      <rect x="12" y="66" width="76" height="6" rx="4" fill="#7a5230" opacity=".8"/>
      <circle cx="23" cy="50" r="3" fill="#c9a84c" opacity=".5"/>
      <circle cx="77" cy="50" r="3" fill="#c9a84c" opacity=".5"/>
    </svg>`,
  bol: (color='#c47a2b') => `
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="50" cy="62" rx="28" ry="8" fill="#111" opacity=".7"/>
      <path d="M22 48 Q22 72 50 72 Q78 72 78 48 Z" fill="${color}" opacity=".9"/>
      <path d="M22 48 Q22 60 50 60 Q78 60 78 48 Z" fill="${color}"/>
      <ellipse cx="50" cy="48" rx="28" ry="9" fill="${color}"/>
      <ellipse cx="50" cy="48" rx="22" ry="7" fill="#0009" opacity=".3"/>
      <ellipse cx="50" cy="48" rx="13" ry="4" fill="#0008" opacity=".5"/>
      <rect x="44" y="26" width="12" height="22" rx="4" fill="${color}"/>
      <ellipse cx="50" cy="26" rx="6" ry="4" fill="${color}"/>
      <ellipse cx="50" cy="26" rx="4" ry="2.5" fill="#0007" opacity=".4"/>
    </svg>`,
  bolGlass: () => `
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="50" cy="62" rx="28" ry="8" fill="#111" opacity=".5"/>
      <path d="M22 48 Q22 72 50 72 Q78 72 78 48 Z" fill="#5bb8d4" opacity=".25"/>
      <path d="M22 48 Q22 60 50 60 Q78 60 78 48 Z" fill="#7dd4e8" opacity=".3"/>
      <ellipse cx="50" cy="48" rx="28" ry="9" fill="#7dd4e8" opacity=".4"/>
      <ellipse cx="50" cy="48" rx="22" ry="7" fill="#aee8f5" opacity=".2"/>
      <ellipse cx="50" cy="48" rx="13" ry="4" fill="#0008" opacity=".3"/>
      <rect x="44" y="26" width="12" height="22" rx="4" fill="#7dd4e8" opacity=".5"/>
      <ellipse cx="50" cy="26" rx="6" ry="4" fill="#aee8f5" opacity=".4"/>
      <path d="M30 42 Q34 38 30 34" stroke="#fff" stroke-width="1.5" opacity=".3" fill="none"/>
    </svg>`,
  grinder: (color='#888') => `
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="38" r="28" fill="${color}"/>
      <circle cx="50" cy="38" r="22" fill="#333" opacity=".8"/>
      <circle cx="50" cy="38" r="14" fill="${color}" opacity=".5"/>
      <circle cx="50" cy="38" r="5" fill="#222"/>
      ${[0,45,90,135,180,225,270,315].map(a => {
        const r = 22, x = 50+r*Math.cos(a*Math.PI/180), y = 38+r*Math.sin(a*Math.PI/180);
        return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4" fill="${color}" opacity=".7"/>`;
      }).join('')}
      <circle cx="50" cy="65" r="20" fill="${color}" opacity=".9"/>
      <circle cx="50" cy="65" r="15" fill="#2a2a2a"/>
      <rect x="42" y="57" width="16" height="16" rx="3" fill="#1a1a1a"/>
      <circle cx="50" cy="38" r="2" fill="#c9a84c"/>
    </svg>`,
};

// ─── Produits (8 au total) ────────────────────────
const PRODUCTS = [
  // ── Plateaux (3)
  {
    id:1, cat:'Plateaux', featured:true,
    name:'Plateau Bambou Nature',
    mat:'Bambou massif · XL',
    desc:'Surface anti-glisse, bords biseautés, finition cire naturelle.',
    price:18,
    badge:'⭐ Best',
    svg: SVG.plateau('#7a5c20','#c9a84c'),
  },
  {
    id:2, cat:'Plateaux', featured:false,
    name:'Plateau Ardoise Noire',
    mat:'Ardoise naturelle',
    desc:'Plateau en ardoise véritable, fond caoutchouc, style premium.',
    price:22,
    badge:null,
    svg: SVG.plateauArdoise(),
  },
  {
    id:3, cat:'Plateaux', featured:false,
    name:'Plateau Rolling Velours',
    mat:'Velours + rebords bois',
    desc:'Rebords en bois, fond velours doux, compact et pratique.',
    price:15,
    badge:'New',
    svg: SVG.plateauRolling(),
  },

  // ── Bols (2)
  {
    id:4, cat:'Bols', featured:true,
    name:'Bol Céramique Fumée',
    mat:'Céramique · 14mm',
    desc:'Céramique mate gris-fumée, cuisson haute température, 14mm.',
    price:12,
    badge:'⭐ Best',
    svg: SVG.bol('#8a7a72'),
  },
  {
    id:5, cat:'Bols', featured:false,
    name:'Bol Pyrex Épais',
    mat:'Verre borosilicate · 18mm',
    desc:'Verre borosilicate résistant, transparent, lavable, 18mm.',
    price:14,
    badge:null,
    svg: SVG.bolGlass(),
  },

  // ── Grinders (3)
  {
    id:6, cat:'Grinders', featured:false,
    name:'Grinder Argent 4 Parties',
    mat:'Aluminium anodisé',
    desc:'4 compartiments, filet magnétique, filtre à pollen inclus.',
    price:24,
    badge:null,
    svg: SVG.grinder('#aaa'),
  },
  {
    id:7, cat:'Grinders', featured:true,
    name:'Grinder Gold Premium',
    mat:'Aluminium doré · 63mm',
    desc:'Finition or brossé, dents en losange extra-tranchantes.',
    price:32,
    badge:'⭐ Top',
    svg: SVG.grinder('#c9a84c'),
  },
  {
    id:8, cat:'Grinders', featured:false,
    name:'Grinder Noir Mat 2 Parties',
    mat:'Zinc · Compact 40mm',
    desc:'Ultra-compact, prise en main ferme, nettoyage facile.',
    price:14,
    badge:'New',
    svg: SVG.grinder('#444'),
  },
];

const CATS = ['Tous', 'Plateaux', 'Bols', 'Grinders'];
let activeTab = 'Tous';
let cart = {};

// ─── Render tabs ──────────────────────────────────
function renderTabs() {
  document.getElementById('tabs').innerHTML = CATS.map(c =>
    `<div class="tab ${c===activeTab?'active':''}" onclick="setTab('${c}')">${c}</div>`
  ).join('');
}
function setTab(c) { activeTab=c; renderTabs(); renderCatalog(); }

// ─── Render catalog ───────────────────────────────
function renderCatalog() {
  const filtered = activeTab==='Tous' ? PRODUCTS : PRODUCTS.filter(p=>p.cat===activeTab);

  // group by cat when "Tous"
  let html = '';
  if (activeTab === 'Tous') {
    for (const cat of ['Plateaux','Bols','Grinders']) {
      const items = filtered.filter(p=>p.cat===cat);
      if (!items.length) continue;
      html += `<div class="section-label">${cat}</div><div class="grid">${items.map(cardHTML).join('')}</div>`;
    }
  } else {
    html = `<div class="grid" style="padding-top:14px">${filtered.map(cardHTML).join('')}</div>`;
  }
  document.getElementById('catalog').innerHTML = html;
}

function cardHTML(p) {
  const qty = cart[p.id]||0;
  const badgeCls = p.badge && p.badge.includes('New') ? 'badge new-badge' : 'badge';
  return `
    <div class="card${p.featured?' featured':''}">
      ${p.badge ? `<div class="${badgeCls}">${p.badge}</div>` : ''}
      <div class="card-img">${p.svg}</div>
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-mat">${p.mat}</div>
        <div class="card-desc">${p.desc}</div>
        <div class="card-footer">
          <div class="card-price">${p.price} €</div>
          ${qty===0
            ? `<button class="add-btn" onclick="addItem(${p.id})">+</button>`
            : `<div class="qty-ctrl">
                 <button class="qty-btn" onclick="removeItem(${p.id})">−</button>
                 <span class="qty-num">${qty}</span>
                 <button class="qty-btn" onclick="addItem(${p.id})">+</button>
               </div>`}
        </div>
      </div>
    </div>`;
}

// ─── Cart logic ───────────────────────────────────
function addItem(id) { cart[id]=(cart[id]||0)+1; refresh(); }
function removeItem(id) {
  if (!cart[id]) return;
  cart[id]--;
  if (cart[id]===0) delete cart[id];
  refresh();
}

function refresh() {
  renderCatalog();
  const count = Object.values(cart).reduce((a,b)=>a+b,0);
  const total = Object.entries(cart).reduce((s,[id,q])=>{
    const p=PRODUCTS.find(x=>x.id==id); return s+(p?p.price*q:0);
  },0);
  const cc=document.getElementById('cartCount');
  cc.textContent=count; count>0?cc.classList.add('on'):cc.classList.remove('on');
  document.getElementById('totalVal').textContent=total.toFixed(2)+' €';
  document.getElementById('orderBtn').disabled=count===0;
  if (document.getElementById('cartPanel').classList.contains('open')) renderCartItems();
}

function renderCartItems() {
  const el=document.getElementById('cpItems');
  const items=Object.entries(cart).filter(([,q])=>q>0);
  if (!items.length) {
    el.innerHTML=`<div class="cp-empty"><div class="cp-empty-icon">🛒</div><div>Votre panier est vide</div></div>`;
    return;
  }
  el.innerHTML=items.map(([id,qty])=>{
    const p=PRODUCTS.find(x=>x.id==id); if(!p) return '';
    return `
      <div class="cp-item">
        <div class="cp-item-img">${p.svg}</div>
        <div class="cp-info">
          <div class="cp-name">${p.name}</div>
          <div class="cp-uprice">${p.price} € / unité</div>
        </div>
        <div class="cp-right">
          <div class="cp-total">${(p.price*qty).toFixed(2)} €</div>
          <div class="qty-ctrl">
            <button class="qty-btn" onclick="removeItem(${p.id})">−</button>
            <span class="qty-num">${qty}</span>
            <button class="qty-btn" onclick="addItem(${p.id})">+</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

function openCart() {
  renderCartItems();
  document.getElementById('cartPanel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
function closeCart() {
  document.getElementById('cartPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ─── Send order ───────────────────────────────────
async function sendOrder() {
  const items=Object.entries(cart).filter(([,q])=>q>0);
  const lines=items.map(([id,qty])=>{
    const p=PRODUCTS.find(x=>x.id==id);
    return '• ' + p.name + ' x' + qty + ' = ' + (p.price*qty).toFixed(2) + ' EUR';
  });
  const total=Object.entries(cart).reduce((s,[id,q])=>{
    const p=PRODUCTS.find(x=>x.id==id); return s+(p?p.price*q:0);
  },0);

  const user = tg?.initDataUnsafe?.user;
  const userName = user ? ('@' + (user.username||user.first_name||'inconnu')) : 'inconnu';
  const userId = user ? String(user.id) : '0';

  const BOT_TOKEN = '8829252461:AAHuG4QJ17LmLqjaFaJoEvy0mL0FeHfjB_Y';
  const SELLER_ID = '5111184497';
  const text = '🔔 Nouvelle commande SmokeHouse\n\n' + lines.join('\n') + '\n\n💰 Total : ' + total.toFixed(2) + ' EUR\n👤 ' + userName + ' (' + userId + ')';

  try {
    await fetch('https://api.telegram.org/bot' + BOT_TOKEN + '/sendMessage', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        chat_id: SELLER_ID,
        text: text,
        reply_markup: { inline_keyboard: [[
          { text: '✅ Confirmer', callback_data: 'confirm:' + userId },
          { text: '❌ Annuler',   callback_data: 'cancel:' + userId }
        ]]}
      })
    });
  } catch(e) { console.error('Erreur envoi commande:', e); }

  closeCart();
  document.getElementById('success').classList.add('show');
}

function resetAll() {
  cart={};
  document.getElementById('success').classList.remove('show');
  refresh();
}

// ─── Init ─────────────────────────────────────────
renderTabs();
renderCatalog();
</script>
